name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate PR title
        if: github.event_name == 'pull_request'
        run: .github/scripts/validate-title.sh "${{ github.event.pull_request.title }}"

      - name: Compute next tag
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        id: next
        run: |
          NEXT=$(.github/scripts/next-tag.sh)
          echo "next tag: ${NEXT:-none}"
          echo "next=${NEXT}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v6
        if: github.event.action != 'edited'
        with:
          go-version-file: go.mod
          cache: true

      - name: Lint
        if: github.event.action != 'edited'
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12

      - name: Test
        if: github.event.action != 'edited'
        run: make test

      - name: Build
        if: github.event.action != 'edited'
        run: make build

      - name: Create and push tag
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && steps.next.outputs.next != ''
        env:
          NEXT: ${{ steps.next.outputs.next }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEXT" -m "Release $NEXT"
          git push origin "$NEXT"
