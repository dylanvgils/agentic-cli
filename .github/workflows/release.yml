name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.2.3), defaults to latest"
        required: false
        default: latest
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "RELEASE_TAG=${{ github.ref_name }}" >> $GITHUB_ENV
          elif [ "${{ inputs.tag }}" = "latest" ]; then
            echo "RELEASE_TAG=$(git describe --tags --abbrev=0)" >> $GITHUB_ENV
          else
            echo "RELEASE_TAG=${{ inputs.tag }}" >> $GITHUB_ENV
          fi

      - name: Checkout release tag
        if: github.event_name == 'workflow_dispatch'
        run: git checkout $RELEASE_TAG

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ env.RELEASE_TAG }}
